name: Resolve gempba-examples ref
description: Pick the gempba-examples branch matching the current ref, falling back to main.

inputs:
  examples-owner:
    description: Owner of the gempba-examples repo.
    required: true
  cross-repo-token:
    description: Token with read access to a private gempba-examples (optional for public).
    required: false
    default: ''

outputs:
  ref:
    description: Resolved branch — the current branch if it exists in gempba-examples, else main.
    value: ${{ steps.resolve.outputs.ref }}

runs:
  using: composite
  steps:
    - id: resolve
      shell: bash
      env:
        CROSS_REPO_TOKEN: ${{ inputs.cross-repo-token }}
        EXAMPLES_OWNER: ${{ inputs.examples-owner }}
      run: |
        if [ -n "$CROSS_REPO_TOKEN" ]; then
          EX_URL="https://x-access-token:${CROSS_REPO_TOKEN}@github.com/${EXAMPLES_OWNER}/gempba-examples.git"
        else
          EX_URL="https://github.com/${EXAMPLES_OWNER}/gempba-examples.git"
        fi
        BRANCH="${{ github.head_ref || github.ref_name }}"
        # actions/checkout@v6 writes its GITHUB_TOKEN auth header to a config file
        # --unset-all can't reach, shadowing the URL-embedded token; -c clears it
        # for this command only.
        set +e
        LS_OUTPUT=$(git -c http."https://github.com/".extraheader= -c credential.helper= ls-remote --exit-code --heads "$EX_URL" "$BRANCH" 2>&1)
        LS_EXIT=$?
        set -e
        if [ "$LS_EXIT" = "0" ]; then
          echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Picked sister branch '$BRANCH' from ${EXAMPLES_OWNER}/gempba-examples"
        elif [ "$LS_EXIT" = "2" ]; then
          echo "ref=main" >> "$GITHUB_OUTPUT"
          echo "Sister branch '$BRANCH' not present in ${EXAMPLES_OWNER}/gempba-examples; falling back to main"
        else
          echo "::error::ls-remote against ${EXAMPLES_OWNER}/gempba-examples failed (exit $LS_EXIT)"
          echo "$LS_OUTPUT"
          exit "$LS_EXIT"
        fi
