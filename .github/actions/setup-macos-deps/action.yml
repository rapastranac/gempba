name: Setup macOS deps
description: Bootstrap Homebrew on PATH and install gempba's brew deps
inputs:
  multiprocessing:
    description: 'ON or OFF — controls open-mpi install'
    required: true
  tests:
    description: 'true to install googletest'
    required: false
    default: 'false'
runs:
  using: composite
  steps:
    - name: Bootstrap Homebrew on PATH
      shell: bash
      run: |
        if [ -x /opt/homebrew/bin/brew ]; then
          BREW_PREFIX=/opt/homebrew
        elif [ -x /usr/local/bin/brew ]; then
          BREW_PREFIX=/usr/local
        else
          echo "Homebrew not found at /opt/homebrew or /usr/local. Install it on the runner first." >&2
          exit 1
        fi
        echo "$BREW_PREFIX/bin" >> "$GITHUB_PATH"
        echo "$BREW_PREFIX/sbin" >> "$GITHUB_PATH"
        eval "$($BREW_PREFIX/bin/brew shellenv)"
        brew --version

    - name: Install brew packages
      shell: bash
      env:
        HOMEBREW_NO_AUTO_UPDATE: '1'   # see gempba#239
      run: |
        brew install cmake pkg-config boost spdlog fmt hwloc
        if [ "${{ inputs.multiprocessing }}" = "ON" ]; then
          brew install open-mpi
        fi
        if [ "${{ inputs.tests }}" = "true" ]; then
          brew install googletest
        fi
