name: Java JNI binding

on:
  push:
    branches: [ "main", "release" ]
  pull_request:
    branches: [ "main", "release" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Shared with release-java.yml so tag-time publish reuses the same build path.
  build:
    uses: ./.github/workflows/_build-java-jars.yml

  publish-test-results:
    needs: [ build ]
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    if: ${{ !cancelled() }}

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v8
        with:
          pattern: test-results-*
          merge-multiple: true

      - name: Publish JUnit report
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'TEST-*.xml'
          check_name: 'Java JNI Test Results'
          fail_on_failure: true
          detailed_summary: true
          include_passed: true
