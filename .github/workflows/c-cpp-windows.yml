name: C/C++ CI (Windows 2022)

on:
  push:
    branches: [ "main", "${NUMBER}-*" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "${NUMBER}-*" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: windows-2022
    timeout-minutes: 10

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # 2️⃣ Set up MSYS2 environment and install dependencies
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-msmpi
            mingw-w64-x86_64-gtest
            mingw-w64-x86_64-spdlog
            mingw-w64-x86_64-fmt

      # 3️⃣ Echo versions of installed dependencies
      - name: Echo Dependencies Version
        shell: msys2 {0}
        run: |
          echo "g++: $(g++ --version | head -1 | awk '{print $NF}')"
          echo "cmake: $(cmake --version | head -1 | awk '{print $3}')"
          echo "make: $(make --version | head -1 | awk '{print $3}')"
          echo "mingw-w64-x86_64-boost: $(pacman -Qi mingw-w64-x86_64-boost | grep Version | awk '{print $3}')"
          echo "mingw-w64-x86_64-msmpi: $(pacman -Qi mingw-w64-x86_64-msmpi | grep Version | awk '{print $3}')"
          echo "mingw-w64-x86_64-gtest: $(pacman -Qi mingw-w64-x86_64-gtest | grep Version | awk '{print $3}')"

      # 4️⃣ Build the project
      - name: Build
        shell: msys2 {0}
        run: |
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" ..
          make -j2

      # 5️⃣ Run tests with JUnit XML output
      - name: Run tests with retry for flaky tests
        shell: msys2 {0}
        run: |
          cd "$GITHUB_WORKSPACE/build"

          echo "🔵 First pass: all tests"
          ctest --output-on-failure --output-junit test_results.xml || true

          echo "🟡 Retry flaky tests (up to 3 attempts)"
          ctest --repeat until-pass:3 --output-on-failure -R "FLAKY_" || true

          echo "🟢 Final check: non-flaky tests MUST be green"
          ctest --output-on-failure -E "FLAKY_"

      # 6️⃣ Upload test results as artifacts
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows
          path: ${{ github.workspace }}/build/test_results.xml
          retention-days: 30

  publish-msys2:
    needs: build-and-test
    runs-on: windows-2022
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # 2️⃣ Set up MSYS2 (no gtest needed for publish build)
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-msmpi
            mingw-w64-x86_64-spdlog
            mingw-w64-x86_64-fmt
            git
            zstd

      # 3️⃣ Build package via makepkg-mingw (handles configure/build/install + metadata)
      - name: Build MSYS2 package
        shell: msys2 {0}
        run: |
          WS=$(cygpath -u "$GITHUB_WORKSPACE")
          VERSION=$(grep -m1 'project(gempba VERSION' CMakeLists.txt | grep -oP '\d+\.\d+\.\d+')

          # Create source tarball from current commit so PKGBUILD can unpack it
          git archive --prefix="gempba-${VERSION}/" HEAD \
            | gzip > "packaging/msys2/gempba-${VERSION}.tar.gz"

          # Patch PKGBUILD: set version and point source at the local tarball
          cd packaging/msys2
          sed -i "s|^pkgver=.*|pkgver=${VERSION}|" PKGBUILD
          sed -i 's|^source=.*|source=("gempba-${pkgver}.tar.gz")|' PKGBUILD

          # makepkg-mingw builds, installs into fakeroot, and adds .PKGINFO/.MTREE
          PKGDEST="$WS" MINGW_ARCH=mingw64 makepkg-mingw --nocheck --noconfirm --noprogressbar

      # 4️⃣a Tag → attach to GitHub Release
      - name: Upload MSYS2 package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/mingw-w64-x86_64-gempba-*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4️⃣b PR → store as workflow artifact for inspection
      - name: Upload MSYS2 package as workflow artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: msys2-package
          path: ${{ github.workspace }}/mingw-w64-x86_64-gempba-*.pkg.tar.zst
          retention-days: 7

  publish-test-results:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: always()

    steps:
      # Download the test results
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-windows

      # Publish test results
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'test_results.xml'
          check_name: 'Windows Test Results'
          fail_on_failure: true
          detailed_summary: true
          include_passed: true
