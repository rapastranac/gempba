name: C/C++ CI (Windows 2022)

on:
  push:
    branches: [ "main", "${NUMBER}-*" ]
  pull_request:
    branches: [ "main", "${NUMBER}-*" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: windows-2022
    timeout-minutes: 10

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # 2️⃣ Set up MSYS2 environment and install dependencies
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-msmpi
            mingw-w64-x86_64-gtest

      # 3️⃣ Echo versions of installed dependencies
      - name: Echo Dependencies Version
        shell: msys2 {0}
        run: |
          echo "g++: $(g++ --version | head -1 | awk '{print $NF}')"
          echo "cmake: $(cmake --version | head -1 | awk '{print $3}')"
          echo "make: $(make --version | head -1 | awk '{print $3}')"
          echo "mingw-w64-x86_64-boost: $(pacman -Qi mingw-w64-x86_64-boost | grep Version | awk '{print $3}')"
          echo "mingw-w64-x86_64-msmpi: $(pacman -Qi mingw-w64-x86_64-msmpi | grep Version | awk '{print $3}')"
          echo "mingw-w64-x86_64-gtest: $(pacman -Qi mingw-w64-x86_64-gtest | grep Version | awk '{print $3}')"

      # 4️⃣ Build the project
      - name: Build
        shell: msys2 {0}
        run: |
          mkdir -p build
          cd build
          cmake -G "MSYS Makefiles" ..
          make -j2

      # 5️⃣ Run tests with JUnit XML output
      - name: Run tests with retry for flaky tests
        shell: msys2 {0}
        run: |
          cd "$GITHUB_WORKSPACE/build"
          
          echo "🔵 First pass: all tests"
          ctest --output-on-failure --output-junit test_results.xml || true
          
          echo "🟡 Retry flaky tests (up to 3 attempts)"
          ctest --repeat until-pass:3 --output-on-failure -R "FLAKY_" || true
          
          echo "🟢 Final check: non-flaky tests MUST be green"
          ctest --output-on-failure -E "FLAKY_"

      # 6️⃣ Upload test results as artifacts
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows
          path: ${{ github.workspace }}/build/test_results.xml
          retention-days: 30

  publish-test-results:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: always()

    steps:
      # Download the test results
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-windows

      # Publish test results
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'test_results.xml'
          check_name: 'Windows Test Results'
          fail_on_failure: true
          detailed_summary: true
          include_passed: true