name: C/C++ CI (Windows 2025)

on:
  push:
    branches: [ "main", "release" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "release" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ${{ fromJSON(vars.RUNNER_WINDOWS || '["windows-2025"]') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        multiprocessing: ['ON', 'OFF']

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # 2️⃣ Set up MSYS2 + MS-MPI runtime (cache: false, release: false preserves
      # the preinstalled C:\msys64 on Server 2025 self-hosted runners — see #159).
      - name: Setup Dependencies
        uses: ./.github/actions/setup-windows-deps
        with:
          multiprocessing: ${{ matrix.multiprocessing }}
          tests: ${{ matrix.multiprocessing == 'ON' && 'true' || 'false' }}
          cache: 'false'
          release: 'false'

      # 3️⃣ Echo versions of installed dependencies
      - name: Echo Dependencies Version
        shell: msys2 {0}
        run: |
          echo "g++: $(g++ --version | head -1 | awk '{print $NF}')"
          echo "cmake: $(cmake --version | head -1 | awk '{print $3}')"
          echo "make: $(make --version | head -1 | awk '{print $3}')"
          echo "mingw-w64-x86_64-boost: $(pacman -Qi mingw-w64-x86_64-boost | grep Version | awk '{print $3}')"
          echo "mingw-w64-x86_64-hwloc: $(pacman -Qi mingw-w64-x86_64-hwloc | grep Version | awk '{print $3}')"
          if [ "${{ matrix.multiprocessing }}" = "ON" ]; then
            echo "mingw-w64-x86_64-msmpi: $(pacman -Qi mingw-w64-x86_64-msmpi | grep Version | awk '{print $3}')"
            echo "mingw-w64-x86_64-gtest: $(pacman -Qi mingw-w64-x86_64-gtest | grep Version | awk '{print $3}')"
          fi

      # 4️⃣ Build the project (no artifact upload — the test job rebuilds
      # locally so every CMake-generated path is resolved on the test runner;
      # ccache wiring for MSYS2+mingw is a separate follow-up)
      - name: Build
        shell: msys2 {0}
        run: |
          cmake -G "MSYS Makefiles" -DGEMPBA_MULTIPROCESSING=${{ matrix.multiprocessing }} -S . -B build
          cmake --build build --parallel $(nproc)

  # Build the gempba-examples sister repo against an installed gempba built
  # from THIS branch. See c-cpp-ubuntu.yml for rationale.
  build-examples-from-install:
    runs-on: ${{ fromJSON(vars.RUNNER_WINDOWS || '["windows-2025"]') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        multiprocessing: ['ON', 'OFF']
    env:
      GEMPBA_EXAMPLES_OWNER: ${{ vars.GEMPBA_EXAMPLES_OWNER || github.repository_owner }}
      GEMPBA_CROSS_REPO_TOKEN: ${{ secrets.GEMPBA_CROSS_REPO_TOKEN || '' }}

    steps:
      # 1️⃣ Checkout gempba (this PR's commit)
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # 2️⃣ Set up MSYS2 + MS-MPI runtime; `extra: git` so the cross-repo clone
      # step has git available inside the msys2 shell.
      - name: Setup Dependencies
        uses: ./.github/actions/setup-windows-deps
        with:
          multiprocessing: ${{ matrix.multiprocessing }}
          tests: 'false'
          extra: 'git'
          cache: 'false'
          release: 'false'

      # 3️⃣ Build and install gempba into a workspace-local prefix
      - name: Install gempba
        shell: msys2 {0}
        run: |
          WS=$(cygpath -u "$GITHUB_WORKSPACE")
          GEMPBA_INSTALL_PREFIX="$WS/.gempba-install"
          echo "GEMPBA_INSTALL_PREFIX=$GEMPBA_INSTALL_PREFIX" >> "$GITHUB_ENV"
          cmake -G "MSYS Makefiles" \
            -S . -B "$RUNNER_TEMP/gempba-build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GEMPBA_INSTALL_PREFIX" \
            -DGEMPBA_BUILD_TESTS=OFF \
            -DGEMPBA_DEV_MODE=OFF \
            -DGEMPBA_MULTIPROCESSING=${{ matrix.multiprocessing }}
          cmake --build "$RUNNER_TEMP/gempba-build" --parallel $(nproc)
          cmake --install "$RUNNER_TEMP/gempba-build"

      # 4️⃣ Resolve sister-repo branch (same-name, fall back to main)
      - name: Resolve gempba-examples ref
        id: examples_ref
        shell: msys2 {0}
        run: |
          # Override any extraheader/credential helper set by actions/checkout
          # (v6 writes the GITHUB_TOKEN auth header to a separate config file
          # that --local --unset-all cannot reach, so the URL-embedded PAT was
          # being shadowed). -c clears them for THIS command only.
          if [ -n "$GEMPBA_CROSS_REPO_TOKEN" ]; then
            EX_URL="https://x-access-token:${GEMPBA_CROSS_REPO_TOKEN}@github.com/${GEMPBA_EXAMPLES_OWNER}/gempba-examples.git"
          else
            EX_URL="https://github.com/${GEMPBA_EXAMPLES_OWNER}/gempba-examples.git"
          fi
          BRANCH="${{ github.head_ref || github.ref_name }}"
          set +e
          LS_OUTPUT=$(git -c http."https://github.com/".extraheader= -c credential.helper= ls-remote --exit-code --heads "$EX_URL" "$BRANCH" 2>&1)
          LS_EXIT=$?
          set -e
          if [ "$LS_EXIT" = "0" ]; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "Picked sister branch '$BRANCH' from $GEMPBA_EXAMPLES_OWNER/gempba-examples"
          elif [ "$LS_EXIT" = "2" ]; then
            echo "ref=main" >> "$GITHUB_OUTPUT"
            echo "Sister branch '$BRANCH' not present in $GEMPBA_EXAMPLES_OWNER/gempba-examples; falling back to main"
          else
            echo "::error::ls-remote against $GEMPBA_EXAMPLES_OWNER/gempba-examples failed (exit $LS_EXIT)"
            echo "$LS_OUTPUT"
            exit "$LS_EXIT"
          fi

      # 5️⃣ Clone gempba-examples and build it against the installed gempba
      - name: Build gempba-examples
        shell: msys2 {0}
        run: |
          if [ -n "$GEMPBA_CROSS_REPO_TOKEN" ]; then
            EX_URL="https://x-access-token:${GEMPBA_CROSS_REPO_TOKEN}@github.com/${GEMPBA_EXAMPLES_OWNER}/gempba-examples.git"
          else
            EX_URL="https://github.com/${GEMPBA_EXAMPLES_OWNER}/gempba-examples.git"
          fi
          git -c http."https://github.com/".extraheader= -c credential.helper= clone --depth 1 --branch "${{ steps.examples_ref.outputs.ref }}" \
            "$EX_URL" "$RUNNER_TEMP/gempba-examples-src"
          cmake -G "MSYS Makefiles" \
            -S "$RUNNER_TEMP/gempba-examples-src" -B "$RUNNER_TEMP/gempba-examples-build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$GEMPBA_INSTALL_PREFIX" \
            -DGEMPBA_MULTIPROCESSING=${{ matrix.multiprocessing }}
          cmake --build "$RUNNER_TEMP/gempba-examples-build" --parallel $(nproc)

  test:
    needs: build
    runs-on: ${{ fromJSON(vars.RUNNER_WINDOWS || '["windows-2025"]') }}
    timeout-minutes: 30

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # 2️⃣ Set up MSYS2 + MS-MPI runtime (same set as build for ABI parity;
      # cache: false, release: false preserves the preinstalled C:\msys64 — see #159).
      - name: Setup Dependencies
        uses: ./.github/actions/setup-windows-deps
        with:
          multiprocessing: 'ON'
          tests: 'true'
          cache: 'false'
          release: 'false'

      # 3️⃣ Build locally with MP=ON so cmake-generated paths point at this
      # runner's workspace. No ccache on Windows yet (mingw+msys2 PATH plumbing
      # is a separate follow-up), so this is a full compile every time. Tests
      # reference gempba::mp::* directly so we never exercise MP=OFF here.
      - name: Configure + build
        shell: msys2 {0}
        run: |
          cmake -G "MSYS Makefiles" -DGEMPBA_MULTIPROCESSING=ON -S . -B build
          cmake --build build --parallel $(nproc)

      # 4️⃣ Run tests with JUnit XML output
      - name: Run tests with retry for flaky tests
        shell: msys2 {0}
        run: |
          cd "$GITHUB_WORKSPACE/build"

          echo "🟢 Non-flaky tests: single run, must pass"
          ctest --output-on-failure --output-junit test_results_main.xml -E "FLAKY_"

          echo "🟡 Flaky tests: up to 3 attempts each"
          ctest --repeat until-pass:3 --output-on-failure --output-junit test_results_flaky.xml -R "FLAKY_" --no-tests=ignore

      # 5️⃣ Upload test results as artifacts
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-windows
          path: ${{ github.workspace }}/build/test_results_*.xml
          retention-days: 30

  publish-msys2:
    needs: build
    runs-on: ${{ fromJSON(vars.RUNNER_WINDOWS || '["windows-2025"]') }}
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
    permissions:
      contents: write

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      # 2️⃣ Set up MSYS2 (no gtest needed for publish build)
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          release: false
          cache: false
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-msmpi
            mingw-w64-x86_64-spdlog
            mingw-w64-x86_64-fmt
            mingw-w64-x86_64-hwloc
            mingw-w64-x86_64-pkgconf
            git
            zstd

      # 3️⃣ Build package via makepkg-mingw (handles configure/build/install + metadata)
      - name: Build MSYS2 package
        shell: msys2 {0}
        run: |
          WS=$(cygpath -u "$GITHUB_WORKSPACE")
          VERSION=$(grep -m1 'project(gempba VERSION' CMakeLists.txt | grep -oP '\d+\.\d+\.\d+')

          # Create source tarball from current commit so PKGBUILD can unpack it
          git archive --prefix="gempba-${VERSION}/" HEAD \
            | gzip > "packaging/msys2/gempba-${VERSION}.tar.gz"

          # Patch PKGBUILD: set version, point source at the local tarball,
          # and skip checksum validation (local git archive != GitHub release tarball)
          cd packaging/msys2
          sed -i "s|^pkgver=.*|pkgver=${VERSION}|" PKGBUILD
          sed -i 's|^source=.*|source=("gempba-${pkgver}.tar.gz")|' PKGBUILD
          sed -i "s|^sha256sums=.*|sha256sums=('SKIP')|" PKGBUILD

          # makepkg-mingw builds, installs into fakeroot, and adds .PKGINFO/.MTREE
          PKGDEST="$WS" MINGW_ARCH=mingw64 makepkg-mingw --nocheck --noconfirm --noprogressbar

      # 4️⃣a Tag → attach to GitHub Release
      - name: Upload MSYS2 package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}/mingw-w64-x86_64-gempba-*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4️⃣b PR → store as workflow artifact for inspection
      - name: Upload MSYS2 package as workflow artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: msys2-package
          path: ${{ github.workspace }}/mingw-w64-x86_64-gempba-*.pkg.tar.zst
          retention-days: 7

      # 5️⃣ Wipe makepkg-mingw fakeroot dirs (read-only files inside trip the
      # next run's `git clean -ffdx` on self-hosted Windows runners).
      - name: Clean up makepkg artifacts
        if: always()
        shell: pwsh
        run: |
          $msys2 = Join-Path $env:GITHUB_WORKSPACE 'packaging\msys2'
          foreach ($name in 'pkg', 'src') {
            $path = Join-Path $msys2 $name
            if (Test-Path -LiteralPath $path) {
              cmd /c "attrib -R `"$path\*`" /S /D" 2>$null
              cmd /c "rd /s /q `"$path`""
            }
          }
          Get-ChildItem -LiteralPath $msys2 -Filter 'gempba-*.tar.gz' -ErrorAction SilentlyContinue |
            Remove-Item -Force

  publish-test-results:
    needs: test
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    if: ${{ !cancelled() }}

    steps:
      # Download the test results
      - name: Download test results
        uses: actions/download-artifact@v8
        with:
          name: test-results-windows

      # Publish test results
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'test_results_*.xml'
          check_name: 'Windows Test Results'
          fail_on_failure: true
          detailed_summary: true
          include_passed: true
