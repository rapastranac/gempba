name: C/C++ CI (Ubuntu 24.04)

on:
  push:
    branches: [ "main", "release" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "release" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        multiprocessing: ['ON', 'OFF']
    env:
      CC: gcc-14
      CXX: g++-14

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # 2️⃣ Set up environment and install dependencies
      - name: Setup Dependencies
        uses: ./.github/actions/setup-ubuntu-deps
        with:
          multiprocessing: ${{ matrix.multiprocessing }}
          tests: ${{ matrix.multiprocessing == 'ON' && 'true' || 'false' }}

      # 3️⃣ Echo versions of installed dependencies
      - name: Echo Dependencies Version
        run: |
          echo "g++: $($CXX --version | head -1 | awk '{print $4}')"
          echo "cmake: $(cmake --version | head -1 | awk '{print $3}')"
          echo "make: $(make --version | head -1 | awk '{print $3}')"
          echo "libboost-dev: $(dpkg -s libboost-dev | grep 'Version' | awk '{print $2}')"
          echo "libhwloc-dev: $(dpkg -s libhwloc-dev | grep 'Version' | awk '{print $2}')"
          if [ "${{ matrix.multiprocessing }}" = "ON" ]; then
            echo "libopenmpi-dev: $(dpkg -s libopenmpi-dev | grep 'Version' | awk '{print $2}')"
            echo "libgtest-dev: $(dpkg -s libgtest-dev | grep 'Version' | awk '{print $2}')"
            echo "libgmock-dev: $(dpkg -s libgmock-dev | grep 'Version' | awk '{print $2}')"
          fi

      # 4️⃣ Set up ccache (per-matrix-leg key so MP=ON and MP=OFF don't poison
      # each other; the MP=ON leg's cache is consumed by the test job below)
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: build-ubuntu-mp${{ matrix.multiprocessing }}

      # 5️⃣ Build the project (no artifact upload — the test job re-runs cmake
      # configure + cmake --build locally with the same ccache key, so every
      # CMake-generated path is resolved on the test runner)
      - name: Build the project
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DGEMPBA_MULTIPROCESSING=${{ matrix.multiprocessing }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          cmake --build build --parallel $(nproc)

  test:
    needs: build
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    timeout-minutes: 30
    env:
      CC: gcc-14
      CXX: g++-14

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # 2️⃣ Set up environment and install dependencies
      - name: Setup Dependencies
        uses: ./.github/actions/setup-ubuntu-deps
        with:
          multiprocessing: 'ON'
          tests: 'true'

      # 3️⃣ Restore the MP=ON cache that the build job populated. save: false
      # because this job doesn't add anything new — the build job is the
      # canonical writer. Tests reference gempba::mp::* directly so we never
      # exercise the MP=OFF leg here.
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: build-ubuntu-mpON
          save: false

      # 4️⃣ Configure + build locally with MP=ON. Same flags as the build job
      # so ccache hashes match; cache hits make this near-instant. cmake-
      # generated paths (CTestTestfile.cmake, gtest_discover_tests output)
      # point at this runner's workspace.
      - name: Configure + cached build
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DGEMPBA_MULTIPROCESSING=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          cmake --build build --parallel $(nproc)

      # 5️⃣ Run tests with JUnit XML output
      - name: Run tests with retry for flaky tests
        run: |
          cd ${{ github.workspace }}/build

          echo "🟢 Non-flaky tests: single run, must pass"
          ctest --output-on-failure --output-junit test_results_main.xml -E "FLAKY_"

          echo "🟡 Flaky tests: up to 3 attempts each"
          ctest --repeat until-pass:3 --output-on-failure --output-junit test_results_flaky.xml -R "FLAKY_" --no-tests=ignore

      # 6️⃣ Upload coverage to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      # 7️⃣ Upload test results as artifacts
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ubuntu
          path: ${{ github.workspace }}/build/test_results_*.xml
          retention-days: 30

  # Build the gempba-examples sister repo against an installed gempba built
  # from THIS branch. Mirror of gempba-examples' own CI job, except it
  # pulls gempba from this PR's commit rather than from a remote sister
  # branch. Matrix on both flavours so an install-surface regression in
  # either mode fails this PR — not the next gempba-examples PR.
  build-examples-from-install:
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        multiprocessing: ['ON', 'OFF']
    env:
      CC: gcc-14
      CXX: g++-14
      GEMPBA_EXAMPLES_OWNER: ${{ vars.GEMPBA_EXAMPLES_OWNER || github.repository_owner }}
      GEMPBA_INSTALL_PREFIX: ${{ github.workspace }}/.gempba-install

    steps:
      # 1️⃣ Checkout gempba (this PR's commit)
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # 2️⃣ Install dependencies (mirror build job's set)
      - name: Setup Dependencies
        uses: ./.github/actions/setup-ubuntu-deps
        with:
          multiprocessing: ${{ matrix.multiprocessing }}
          tests: 'false'

      # 3️⃣ Build and install gempba into a workspace-local prefix
      - name: Install gempba
        run: |
          cmake -S . -B "$RUNNER_TEMP/gempba-build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GEMPBA_INSTALL_PREFIX" \
            -DGEMPBA_BUILD_TESTS=OFF \
            -DGEMPBA_DEV_MODE=OFF \
            -DGEMPBA_MULTIPROCESSING=${{ matrix.multiprocessing }}
          cmake --build "$RUNNER_TEMP/gempba-build" --parallel $(nproc)
          cmake --install "$RUNNER_TEMP/gempba-build"

      # 4️⃣ Resolve the gempba-examples ref. Prefer a same-named branch in the
      # examples sister repo so paired API changes are picked up atomically;
      # fall back to `main` for non-breaking PRs.
      - name: Resolve gempba-examples ref
        id: examples_ref
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          if git ls-remote --exit-code --heads "https://github.com/$GEMPBA_EXAMPLES_OWNER/gempba-examples.git" "$BRANCH" >/dev/null 2>&1; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "Picked sister branch '$BRANCH' from $GEMPBA_EXAMPLES_OWNER/gempba-examples"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
            echo "Sister branch '$BRANCH' not present in $GEMPBA_EXAMPLES_OWNER/gempba-examples; falling back to main"
          fi

      # 5️⃣ Clone gempba-examples and build it against the installed gempba
      - name: Build gempba-examples
        run: |
          git clone --depth 1 --branch "${{ steps.examples_ref.outputs.ref }}" \
            "https://github.com/$GEMPBA_EXAMPLES_OWNER/gempba-examples.git" "$RUNNER_TEMP/gempba-examples-src"
          cmake -S "$RUNNER_TEMP/gempba-examples-src" -B "$RUNNER_TEMP/gempba-examples-build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$GEMPBA_INSTALL_PREFIX" \
            -DGEMPBA_MULTIPROCESSING=${{ matrix.multiprocessing }}
          cmake --build "$RUNNER_TEMP/gempba-examples-build" --parallel $(nproc)

  publish-deb:
    needs: build
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
    permissions:
      contents: write
    env:
      CC: gcc-14
      CXX: g++-14

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      # 2️⃣ Install build dependencies (no test libs needed)
      - name: Setup Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gcc-14 g++-14 make libopenmpi-dev libspdlog-dev libfmt-dev libhwloc-dev pkg-config

      # 3️⃣ Configure for Release, targeting /usr prefix
      - name: Configure (Release)
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DGEMPBA_BUILD_TESTS=OFF \
            -DGEMPBA_DEV_MODE=OFF \
            -DGEMPBA_MULTIPROCESSING=ON

      # 4️⃣ Build
      - name: Build
        run: cmake --build build --parallel $(nproc)

      # 5️⃣ Generate .deb with CPack
      - name: Package .deb
        run: cd build && cpack -G DEB

      # 6️⃣a Tag → attach to GitHub Release
      - name: Upload .deb to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6️⃣b Store as workflow artifact so publish-apt-repo can consume it.
      # Always uploaded (tag + PR) so publish-apt-repo's download step has a
      # uniform source. The Release attachment in step 6️⃣a is independent and
      # only fires on tag pushes.
      - name: Upload .deb as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: deb-package
          path: build/*.deb
          retention-days: 7

  # Apply the curated release-notes file to the GitHub Release body created by
  # `publish-deb`. Must live in the same workflow (rather than listening on
  # `release: created` or `workflow_run`) because Actions suppresses recursive
  # triggers from `GITHUB_TOKEN`-authored events. Same-workflow guarantees
  # ordering after the Release exists.
  set-release-body:
    needs: publish-deb
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout the tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup gh CLI
        uses: ./.github/actions/setup-gh-cli

      - name: Apply release notes to GitHub Release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          NOTES="docs/releases/release-notes-v${VERSION}.md"
          if [[ ! -f "$NOTES" ]]; then
            echo "::error::missing $NOTES — was the release-notes file curated and merged before tagging?"
            exit 1
          fi
          gh release edit "$TAG" --notes-file "$NOTES"

  publish-apt-repo:
    needs: publish-deb
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'pull_request'
    # No github-pages environment here — environment protection rules apply at
    # the job level, so even guarded steps are blocked on PRs. Deployment is
    # handled by the separate deploy-apt-pages job (tag-only).
    permissions:
      contents: read
      pages: write      # needed for upload-pages-artifact
      id-token: write   # needed for upload-pages-artifact

    steps:
      # 1️⃣ Checkout (needs apt-repo/conf/distributions and pubkey.gpg)
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2️⃣ Install reprepro
      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      # 3️⃣ Import GPG private key from Secrets
      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      # 4️⃣ Patch distributions with the real key ID from Variables
      - name: Set GPG key ID
        run: |
          sed -i "s|SIGN_WITH_KEY_ID|${{ vars.GPG_KEY_ID }}|" \
            apt-repo/conf/distributions

      # 5️⃣ Download .deb from the workflow artifact uploaded by publish-deb.
      # Single code path for both tag and PR — no `gh release download`, so the
      # self-hosted Linux runner image doesn't need the gh CLI just for this
      # step. (See #170 for the gh-missing-on-self-hosted-runners failure.)
      - name: Download .deb from artifact
        uses: actions/download-artifact@v8
        with:
          name: deb-package
          path: deb-download

      # 6️⃣ Build the APT index (Packages, Release, InRelease) — runs in both cases
      - name: Build APT index with reprepro
        run: |
          for deb in deb-download/*.deb; do
            reprepro -b apt-repo includedeb stable "$deb"
          done

      # 7️⃣a Tag → stage as Pages artifact for deploy-apt-pages job
      - name: Upload Pages artifact (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-pages-artifact@v3
        with:
          path: apt-repo/

      # 7️⃣b PR → store apt-repo as a workflow artifact for inspection
      - name: Upload APT index as workflow artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: apt-repo-index
          path: apt-repo/
          retention-days: 7

  deploy-apt-pages:
    needs: publish-apt-repo
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    # Environment protection rules only apply here — PRs never reach this job
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-test-results:
    needs: test
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    if: ${{ !cancelled() }}

    steps:
      # Download the test results
      - name: Download test results
        uses: actions/download-artifact@v8
        with:
          name: test-results-ubuntu

      # Publish test results
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'test_results_*.xml'
          check_name: 'Ubuntu Test Results'
          fail_on_failure: true
          detailed_summary: true
          include_passed: true
