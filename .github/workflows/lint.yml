name: Lint

on:
  push:
    branches: [ "main", "release" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "release" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Setup Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gcc make
          sudo apt-get install -y libboost-all-dev
          sudo apt-get install -y libopenmpi-dev
          sudo apt-get install -y libspdlog-dev libfmt-dev
          sudo apt-get install -y libhwloc-dev pkg-config
          sudo apt-get install -y libgtest-dev libgmock-dev
          sudo apt-get install -y lsb-release wget gnupg software-properties-common

      - name: Install LLVM
        run: |
          # `llvm.sh -- 21` installs the LLVM 21 apt repo (which also exposes
          # the 19 packages we use for tidy). We pin clang-tidy to 19 — not 21
          # — because clang-21's stricter consteval evaluation breaks inside
          # the system spdlog/fmt headers on `FMT_STRING("{:02}")`. That's a
          # clang-21 × system-spdlog/fmt incompatibility, not a gempba bug;
          # bumping past 19 needs a newer spdlog on the runner image first.
          # clang-format stays on 21 (no consteval interaction).
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 21
          sudo apt-get install -y clang-format-21 clang-tidy-19 clang-19
          echo "CLANG_FORMAT=clang-format-21" >> $GITHUB_ENV
          echo "CLANG_TIDY=clang-tidy-19"    >> $GITHUB_ENV
          echo "RUN_CLANG_TIDY=run-clang-tidy-19" >> $GITHUB_ENV

      - name: Echo Tool Versions
        run: |
          echo "clang-tidy:   $(${CLANG_TIDY} --version | head -2 | tail -1 | xargs)"
          echo "clang-format: $(${CLANG_FORMAT} --version)"
          echo "cmake:        $(cmake --version | head -1 | awk '{print $3}')"
          echo "g++:          $(g++ --version | head -1 | awk '{print $4}')"

      - name: Run clang-format check
        run: bash scripts/lint.sh --format-only

      - name: Run clang-tidy check
        run: bash scripts/lint.sh --tidy-only
