name: C/C++ CI (macOS 26)

on:
  push:
    branches: [ "main", "release" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "release" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ${{ fromJSON(vars.RUNNER_MACOS || '["macos-26"]') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        multiprocessing: ['ON', 'OFF']

    steps:
      - name: Clean stale .git locks from prior interrupted runs
        shell: bash
        run: |
          if [ -d "$GITHUB_WORKSPACE/.git" ]; then
            find "$GITHUB_WORKSPACE/.git" -name '*.lock' -delete 2>/dev/null || true
          fi

      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # 2️⃣ Bootstrap Homebrew on PATH + install brew packages
      - name: Setup Dependencies
        uses: ./.github/actions/setup-macos-deps
        with:
          multiprocessing: ${{ matrix.multiprocessing }}
          tests: ${{ matrix.multiprocessing == 'ON' && 'true' || 'false' }}

      # 3️⃣ Echo versions of installed dependencies
      - name: Echo Dependencies Version
        run: |
          echo "g++: $(g++ --version | head -1)"
          echo "cmake: $(cmake --version | head -1 | awk '{print $3}')"
          echo "make: $(make --version | head -1 | awk '{print $3}')"
          echo "boost: $(brew info boost --json | python3 -c 'import sys,json; print(json.load(sys.stdin)[0]["versions"]["stable"])')"
          echo "hwloc: $(brew info hwloc --json | python3 -c 'import sys,json; print(json.load(sys.stdin)[0]["versions"]["stable"])')"
          if [ "${{ matrix.multiprocessing }}" = "ON" ]; then
            echo "open-mpi: $(mpicc --showme:version 2>/dev/null || brew info open-mpi --json | python3 -c 'import sys,json; print(json.load(sys.stdin)[0]["versions"]["stable"])')"
            echo "googletest: $(brew info googletest --json | python3 -c 'import sys,json; print(json.load(sys.stdin)[0]["versions"]["stable"])')"
          fi

      # 4️⃣ Set up ccache (per-matrix-leg key so MP=ON and MP=OFF don't poison
      # each other; the MP=ON leg's cache is consumed by the test job below)
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: build-macos-mp${{ matrix.multiprocessing }}

      # 5️⃣ Build the project (no artifact upload — the test job re-runs cmake
      # configure + cmake --build locally with the same ccache key, so every
      # CMake-generated path is resolved on the test runner)
      - name: Build the project
        run: |
          cmake -S . -B build \
            -DGEMPBA_MULTIPROCESSING=${{ matrix.multiprocessing }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DOpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp -I$(brew --prefix libomp)/include" \
            -DOpenMP_CXX_LIB_NAMES="omp" \
            -DOpenMP_omp_LIBRARY=$(brew --prefix libomp)/lib/libomp.dylib \
            -DCMAKE_PREFIX_PATH=$(brew --prefix boost)
          cmake --build build --parallel $(sysctl -n hw.logicalcpu)

  test:
    needs: build
    runs-on: ${{ fromJSON(vars.RUNNER_MACOS || '["macos-26"]') }}
    timeout-minutes: 30

    steps:
      - name: Clean stale .git locks from prior interrupted runs
        shell: bash
        run: |
          if [ -d "$GITHUB_WORKSPACE/.git" ]; then
            find "$GITHUB_WORKSPACE/.git" -name '*.lock' -delete 2>/dev/null || true
          fi

      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # 2️⃣ Bootstrap Homebrew on PATH + install brew packages
      - name: Setup Dependencies
        uses: ./.github/actions/setup-macos-deps
        with:
          multiprocessing: 'ON'
          tests: 'true'

      # 3️⃣ Restore the MP=ON cache that the build job populated. save: false
      # because this job doesn't add anything new — the build job is the
      # canonical writer. Tests reference gempba::mp::* directly so we never
      # exercise the MP=OFF leg here.
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: build-macos-mpON
          save: false

      # 4️⃣ Configure + build locally with MP=ON. Same flags as the build job
      # so ccache hashes match; cache hits make this near-instant. cmake-
      # generated paths (CTestTestfile.cmake, gtest_discover_tests output)
      # point at this runner's workspace.
      - name: Configure + cached build
        run: |
          cmake -S . -B build \
            -DGEMPBA_MULTIPROCESSING=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DOpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp -I$(brew --prefix libomp)/include" \
            -DOpenMP_CXX_LIB_NAMES="omp" \
            -DOpenMP_omp_LIBRARY=$(brew --prefix libomp)/lib/libomp.dylib \
            -DCMAKE_PREFIX_PATH=$(brew --prefix boost)
          cmake --build build --parallel $(sysctl -n hw.logicalcpu)

      # 5️⃣ Run tests with JUnit XML output
      - name: Run tests with retry for flaky tests
        run: |
          cd ${{ github.workspace }}/build

          echo "🟢 Non-flaky tests: single run, must pass"
          ctest --output-on-failure --output-junit test_results_main.xml -E "FLAKY_"

          echo "🟡 Flaky tests: up to 3 attempts each"
          ctest --repeat until-pass:3 --output-on-failure --output-junit test_results_flaky.xml -R "FLAKY_" --no-tests=ignore

      # 6️⃣ Upload test results as artifacts
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-macos
          path: ${{ github.workspace }}/build/test_results_*.xml
          retention-days: 30

  # Build the gempba-examples sister repo against an installed gempba built
  # from THIS branch. See c-cpp-ubuntu.yml for rationale.
  build-examples-from-install:
    runs-on: ${{ fromJSON(vars.RUNNER_MACOS || '["macos-26"]') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        multiprocessing: ['ON', 'OFF']
    env:
      GEMPBA_EXAMPLES_OWNER: ${{ vars.GEMPBA_EXAMPLES_OWNER || github.repository_owner }}
      GEMPBA_INSTALL_PREFIX: ${{ github.workspace }}/.gempba-install
      GEMPBA_CROSS_REPO_TOKEN: ${{ secrets.GEMPBA_CROSS_REPO_TOKEN || '' }}

    steps:
      - name: Clean stale .git locks from prior interrupted runs
        shell: bash
        run: |
          if [ -d "$GITHUB_WORKSPACE/.git" ]; then
            find "$GITHUB_WORKSPACE/.git" -name '*.lock' -delete 2>/dev/null || true
          fi

      # 1️⃣ Checkout gempba (this PR's commit)
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # 2️⃣ Install dependencies (mirror build job's set)
      - name: Setup Dependencies
        uses: ./.github/actions/setup-macos-deps
        with:
          multiprocessing: ${{ matrix.multiprocessing }}
          tests: 'false'

      # 3️⃣ Install gempba mt (the base package) into the prefix. The mpi
      #    topping package depends on the mt base for headers and the
      #    gempbaConfig.cmake dispatcher, so the mt install always happens
      #    first — even on the MP=ON matrix leg.
      - name: Install gempba (mt base)
        run: |
          cmake -S . -B "$RUNNER_TEMP/gempba-build-mt" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GEMPBA_INSTALL_PREFIX" \
            -DGEMPBA_BUILD_TESTS=OFF \
            -DGEMPBA_DEV_MODE=OFF \
            -DGEMPBA_MULTIPROCESSING=OFF \
            -DOpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp -I$(brew --prefix libomp)/include" \
            -DOpenMP_CXX_LIB_NAMES="omp" \
            -DOpenMP_omp_LIBRARY=$(brew --prefix libomp)/lib/libomp.dylib \
            -DCMAKE_PREFIX_PATH=$(brew --prefix boost)
          cmake --build "$RUNNER_TEMP/gempba-build-mt" --parallel $(sysctl -n hw.logicalcpu)
          cmake --install "$RUNNER_TEMP/gempba-build-mt"

      # 3️⃣bis Layer the mpi topping on top of the mt base when the matrix
      #       leg is MP=ON. Adds libgempba_mpi.a + gempba_mpi-targets.cmake
      #       so find_package(gempba COMPONENTS mpi) resolves.
      - name: Install gempba (mpi topping)
        if: matrix.multiprocessing == 'ON'
        run: |
          cmake -S . -B "$RUNNER_TEMP/gempba-build-mpi" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$GEMPBA_INSTALL_PREFIX" \
            -DGEMPBA_BUILD_TESTS=OFF \
            -DGEMPBA_DEV_MODE=OFF \
            -DGEMPBA_MULTIPROCESSING=ON \
            -DOpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp -I$(brew --prefix libomp)/include" \
            -DOpenMP_CXX_LIB_NAMES="omp" \
            -DOpenMP_omp_LIBRARY=$(brew --prefix libomp)/lib/libomp.dylib \
            -DCMAKE_PREFIX_PATH=$(brew --prefix boost)
          cmake --build "$RUNNER_TEMP/gempba-build-mpi" --parallel $(sysctl -n hw.logicalcpu)
          cmake --install "$RUNNER_TEMP/gempba-build-mpi"

      # 4️⃣ Resolve sister-repo branch (same-name, fall back to main)
      - name: Resolve gempba-examples ref
        id: examples_ref
        run: |
          # Override any extraheader/credential helper set by actions/checkout
          # (v6 writes the GITHUB_TOKEN auth header to a separate config file
          # that --local --unset-all cannot reach, so the URL-embedded PAT was
          # being shadowed). -c clears them for THIS command only.
          if [ -n "$GEMPBA_CROSS_REPO_TOKEN" ]; then
            EX_URL="https://x-access-token:${GEMPBA_CROSS_REPO_TOKEN}@github.com/${GEMPBA_EXAMPLES_OWNER}/gempba-examples.git"
          else
            EX_URL="https://github.com/${GEMPBA_EXAMPLES_OWNER}/gempba-examples.git"
          fi
          BRANCH="${{ github.head_ref || github.ref_name }}"
          set +e
          LS_OUTPUT=$(git -c http."https://github.com/".extraheader= -c credential.helper= ls-remote --exit-code --heads "$EX_URL" "$BRANCH" 2>&1)
          LS_EXIT=$?
          set -e
          if [ "$LS_EXIT" = "0" ]; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "Picked sister branch '$BRANCH' from $GEMPBA_EXAMPLES_OWNER/gempba-examples"
          elif [ "$LS_EXIT" = "2" ]; then
            echo "ref=main" >> "$GITHUB_OUTPUT"
            echo "Sister branch '$BRANCH' not present in $GEMPBA_EXAMPLES_OWNER/gempba-examples; falling back to main"
          else
            echo "::error::ls-remote against $GEMPBA_EXAMPLES_OWNER/gempba-examples failed (exit $LS_EXIT)"
            echo "$LS_OUTPUT"
            exit "$LS_EXIT"
          fi

      # 5️⃣ Clone gempba-examples and build it against the installed gempba
      - name: Build gempba-examples
        run: |
          if [ -n "$GEMPBA_CROSS_REPO_TOKEN" ]; then
            EX_URL="https://x-access-token:${GEMPBA_CROSS_REPO_TOKEN}@github.com/${GEMPBA_EXAMPLES_OWNER}/gempba-examples.git"
          else
            EX_URL="https://github.com/${GEMPBA_EXAMPLES_OWNER}/gempba-examples.git"
          fi
          git -c http."https://github.com/".extraheader= -c credential.helper= clone --depth 1 --branch "${{ steps.examples_ref.outputs.ref }}" \
            "$EX_URL" "$RUNNER_TEMP/gempba-examples-src"
          cmake -S "$RUNNER_TEMP/gempba-examples-src" -B "$RUNNER_TEMP/gempba-examples-build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$GEMPBA_INSTALL_PREFIX;$(brew --prefix boost)" \
            -DGEMPBA_MULTIPROCESSING=${{ matrix.multiprocessing }} \
            -DOpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp -I$(brew --prefix libomp)/include" \
            -DOpenMP_CXX_LIB_NAMES="omp" \
            -DOpenMP_omp_LIBRARY=$(brew --prefix libomp)/lib/libomp.dylib
          cmake --build "$RUNNER_TEMP/gempba-examples-build" --parallel $(sysctl -n hw.logicalcpu)

  publish-test-results:
    needs: test
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    if: ${{ !cancelled() }}

    steps:
      # Download the test results
      - name: Download test results
        uses: actions/download-artifact@v8
        with:
          name: test-results-macos

      # Publish test results
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'test_results_*.xml'
          check_name: 'macOS Test Results'
          fail_on_failure: true
          detailed_summary: true
          include_passed: true