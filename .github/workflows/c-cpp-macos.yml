name: C/C++ CI (macOS 26)

on:
  push:
    branches: [ "main", "${NUMBER}-*" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "${NUMBER}-*" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 10

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # 2️⃣ Set up environment and install dependencies
      - name: Setup Dependencies
        run: |
          brew update
          brew install cmake
          brew install boost
          brew install open-mpi
          brew install spdlog
          brew install fmt
          brew install googletest
          brew install libomp

      # 3️⃣ Echo versions of installed dependencies
      - name: Echo Dependencies Version
        run: |
          echo "g++: $(g++ --version | head -1)"
          echo "cmake: $(cmake --version | head -1 | awk '{print $3}')"
          echo "make: $(make --version | head -1 | awk '{print $3}')"
          echo "boost: $(brew info boost --json | python3 -c 'import sys,json; print(json.load(sys.stdin)[0]["versions"]["stable"])')"
          echo "open-mpi: $(mpicc --showme:version 2>/dev/null || brew info open-mpi --json | python3 -c 'import sys,json; print(json.load(sys.stdin)[0]["versions"]["stable"])')"
          echo "googletest: $(brew info googletest --json | python3 -c 'import sys,json; print(json.load(sys.stdin)[0]["versions"]["stable"])')"

      # 4️⃣ Build the project
      - name: Build the project
        run: |
          cd ${{ github.workspace }}
          mkdir -p build
          cd build
          cmake .. \
            -DOpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp -I$(brew --prefix libomp)/include" \
            -DOpenMP_CXX_LIB_NAMES="omp" \
            -DOpenMP_omp_LIBRARY=$(brew --prefix libomp)/lib/libomp.dylib \
            -DCMAKE_PREFIX_PATH=$(brew --prefix boost)
          make -j$(sysctl -n hw.logicalcpu)

      # 5️⃣ Run tests with JUnit XML output
      - name: Run tests with retry for flaky tests
        run: |
          cd ${{ github.workspace }}/build

          echo "🔵 First pass: all tests"
          ctest --output-on-failure --output-junit test_results.xml || true

          echo "🟡 Retry flaky tests (up to 3 attempts)"
          ctest --repeat until-pass:3 --output-on-failure -R "FLAKY_" || true

          echo "🟢 Final check: non-flaky tests MUST be green"
          ctest --output-on-failure -E "FLAKY_"

      # 6️⃣ Upload test results as artifacts
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-macos
          path: ${{ github.workspace }}/build/test_results.xml
          retention-days: 30

  publish-test-results:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: always()

    steps:
      # Download the test results
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-macos

      # Publish test results
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'test_results.xml'
          check_name: 'macOS Test Results'
          fail_on_failure: true
          detailed_summary: true
          include_passed: true