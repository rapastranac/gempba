name: Update Homebrew Tap

# publish depends on verify-macos, so a non-installable formula blocks the PR
# and aborts the release instead of shipping (gempba#292).
#
# Per-owner setup to publish: create <owner>/homebrew-gempba and add
# secrets.HOMEBREW_TAP_TOKEN (contents:write on the tap). Mixed-owner publish:
# vars.GEMPBA_PUBLIC_REPO (tarball source), vars.HOMEBREW_TAP_REPO (tap target),
# secrets.GEMPBA_CROSS_REPO_TOKEN (read on a private tarball source).

on:
  push:
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
    paths:
      - 'packaging/homebrew/**'
      - 'external/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/release-homebrew-tap.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v3.0.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  render:
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    env:
      PUBLIC_REPO: ${{ vars.GEMPBA_PUBLIC_REPO || github.repository }}

    steps:
      - name: Checkout gempba
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Resolve tag
        id: tag
        run: |
          case "${{ github.event_name }}" in
            workflow_dispatch)
              TAG="${{ inputs.tag }}"
              ;;
            push)
              TAG="${GITHUB_REF_NAME}"
              ;;
            pull_request)
              VER=$(grep -m1 'project(gempba VERSION' CMakeLists.txt | grep -oP '\d+\.\d+\.\d+')
              TAG="v${VER}-pr${{ github.event.pull_request.number }}"
              ;;
            *)
              echo "::error::unsupported event ${{ github.event_name }}"
              exit 1
              ;;
          esac
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"

      # api.github.com tarball endpoint, not github.com/.../archive: the latter
      # ignores Authorization and 404s on private repos. Honours GITHUB_TOKEN
      # (and HOMEBREW_GITHUB_API_TOKEN consumer-side).
      - name: Compute tarball sha256
        id: sha
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GEMPBA_CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          URL="https://api.github.com/repos/${PUBLIC_REPO}/tarball/refs/tags/${TAG}"
          curl -fsSL -L \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -o release.tar.gz \
            "${URL}"
          SHA=$(shasum -a 256 release.tar.gz | awk '{print $1}')
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA}"

      - name: Render formulas
        run: |
          mkdir -p out/Formula
          for name in gempba gempba-mpi; do
            cp "packaging/homebrew/${name}.rb.in" "out/Formula/${name}.rb"
            sed -i "s|__OWNER_REPO__|${PUBLIC_REPO}|g" "out/Formula/${name}.rb"
          done

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            URL='${{ steps.sha.outputs.url }}'
            SHA='${{ steps.sha.outputs.sha }}'
            VERSION='${{ steps.sha.outputs.version }}'
            for name in gempba gempba-mpi; do
              # Anchored substitutions: leave head and the vendored resource
              # url/sha256 lines untouched.
              sed -i -E "s|^(\s*url\s+\")https://api\.github\.com/repos/.*(\")|\1${URL}\2|" "out/Formula/${name}.rb"
              sed -i -E "s|^(\s*version\s+\").*(\")|\1${VERSION}\2|" "out/Formula/${name}.rb"
              sed -i -E "s|^(\s*sha256\s+\")0{64}(\")|\1${SHA}\2|" "out/Formula/${name}.rb"
            done
          fi

          for name in gempba gempba-mpi; do
            echo "--- rendered ${name}.rb ---"
            cat "out/Formula/${name}.rb"
          done

      - name: Upload rendered formulas
        uses: actions/upload-artifact@v7
        with:
          name: homebrew-formulas
          path: out/Formula/
          retention-days: 7

  verify-macos:
    needs: render
    runs-on: ${{ fromJSON(vars.RUNNER_MACOS || '["macos-26"]') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        flavor: [ gempba, gempba-mpi ]

    steps:
      - name: Clean stale .git locks from prior interrupted runs
        shell: bash
        run: |
          if [ -d "$GITHUB_WORKSPACE/.git" ]; then
            find "$GITHUB_WORKSPACE/.git" -name '*.lock' -delete 2>/dev/null || true
          fi

      - name: Checkout gempba
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup macOS deps
        uses: ./.github/actions/setup-macos-deps
        with:
          multiprocessing: 'ON'
          tests: 'false'

      - name: Download rendered formulas
        uses: actions/download-artifact@v7
        with:
          name: homebrew-formulas
          path: out/Formula

      - name: Build and test the formula
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GEMPBA_CROSS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          FLAVOR: ${{ matrix.flavor }}
        run: |
          set -euo pipefail

          # Verify against a local source tarball, not the api.github.com url:
          # that url 404s for brew's unauthenticated download on a private repo.
          SRC="$RUNNER_TEMP/gempba-src.tar.gz"
          git archive --format=tar.gz --prefix=gempba/ -o "$SRC" HEAD
          SHA=$(shasum -a 256 "$SRC" | awk '{print $1}')
          f="out/Formula/${FLAVOR}.rb"
          sed -i '' -E "s|^([[:space:]]*url[[:space:]]+\")https://api\.github\.com/repos/.*(\")|\1file://${SRC}\2|" "$f"
          # Range exclusion skips the resource blocks so only the package sha is rewritten.
          sed -i '' -E "/^[[:space:]]*resource /,/^[[:space:]]*end$/!s|^([[:space:]]*sha256[[:space:]]+\")[0-9a-fA-F]{64}(\")|\1${SHA}\2|" "$f"

          # Persistent runner: hard-reset the tap namespace so a leftover tap
          # dir from an interrupted run cannot collide.
          brew uninstall --force gempba-mpi gempba 2>/dev/null || true
          rm -rf "$(brew --repository)/Library/Taps/gempba"
          brew tap-new gempba/citest --no-git
          TAP="$(brew --repository)/Library/Taps/gempba/homebrew-citest/Formula"
          mkdir -p "$TAP"
          cp "out/Formula/${FLAVOR}.rb" "$TAP"/

          brew install --build-from-source "gempba/citest/${FLAVOR}"
          brew test                        "gempba/citest/${FLAVOR}"

      - name: Cleanup tap and kegs
        if: always()
        run: |
          brew uninstall --force gempba-mpi gempba 2>/dev/null || true
          rm -rf "$(brew --repository)/Library/Taps/gempba"

  publish:
    needs: [ render, verify-macos ]
    if: github.event_name != 'pull_request'
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    timeout-minutes: 5
    env:
      TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO || format('{0}/homebrew-gempba', github.repository_owner) }}

    steps:
      - name: Download rendered formulas
        uses: actions/download-artifact@v7
        with:
          name: homebrew-formulas
          path: out/Formula

      - name: Checkout homebrew tap
        uses: actions/checkout@v6
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Commit and push
        working-directory: tap
        env:
          TAG: ${{ needs.render.outputs.tag }}
        run: |
          mkdir -p Formula
          cp ../out/Formula/gempba.rb     Formula/gempba.rb
          cp ../out/Formula/gempba-mpi.rb Formula/gempba-mpi.rb

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Compare index vs HEAD (not working tree): git diff --quiet ignores
          # untracked paths, so a first-ever publish would skip the commit.
          git add Formula/gempba.rb Formula/gempba-mpi.rb
          if git diff --cached --quiet -- Formula/gempba.rb Formula/gempba-mpi.rb; then
            echo "Formulas already up to date; nothing to commit."
            exit 0
          fi

          git commit -m "gempba ${TAG}"
          git push origin HEAD:main
