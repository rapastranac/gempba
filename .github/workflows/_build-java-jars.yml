name: Build Java JARs (reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-ubuntu:
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: MT
            mp_flag: 'OFF'
            mvn_variant: multithreading
            classifier: mt
          - variant: MP
            mp_flag: 'ON'
            mvn_variant: multiprocessing
            classifier: mp-mpi
    env:
      CC: gcc-14
      CXX: g++-14

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # 2️⃣ Native toolchain + MPI when MP — same composite the C/C++ jobs use,
      # so the JNI library links against the exact deps gempba itself was tested with.
      - name: Setup native deps
        uses: ./.github/actions/setup-ubuntu-deps
        with:
          multiprocessing: ${{ matrix.mp_flag }}
          tests: 'false'

      # 3️⃣ Pin the JDK so `mvn` finds it even on minimally-provisioned runners,
      # and cache ~/.m2 across runs of this workflow.
      - name: Setup JDK 25
        uses: ./.github/actions/setup-java-jdk

      - name: Echo versions
        run: |
          echo "g++: $($CXX --version | head -1 | awk '{print $4}')"
          echo "cmake: $(cmake --version | head -1 | awk '{print $3}')"
          echo "java: $(java -version 2>&1 | head -1)"
          echo "mvn: $(mvn -v | head -1)"

      # 4️⃣ Builds gempba_jni.so into bindings/java/src/main/resources/natives/<classifier>
      # and `mvn install -DskipTests`s the variant JAR (mt or mp-mpi). Tests run
      # in the next step against the just-installed artifacts.
      - name: Build native JNI library + variant JAR
        run: bash scripts/build_jar_linux.sh ${{ matrix.variant }}

      - name: Run Java tests
        working-directory: bindings/java
        run: mvn -B test -Dgempba.variant=${{ matrix.mvn_variant }}

      - name: Upload variant JAR
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: jar-ubuntu-${{ matrix.classifier }}
          path: bindings/java/target/gempba-*-${{ matrix.classifier }}.jar
          if-no-files-found: error

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results-ubuntu-${{ matrix.variant }}
          path: bindings/java/target/surefire-reports/TEST-*.xml
          if-no-files-found: warn

  build-windows:
    runs-on: ${{ fromJSON(vars.RUNNER_WINDOWS || '["windows-2025"]') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: MT
            mp_flag: 'OFF'
            mvn_variant: multithreading
            classifier: mt
          - variant: MP
            mp_flag: 'ON'
            mvn_variant: multiprocessing
            classifier: mp-mpi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # MSYS2 + MS-MPI runtime; cache: false, release: false keeps the preinstalled
      # C:\msys64 on Server 2025 self-hosted runners (see #159), matching the
      # C/C++ Windows workflow.
      - name: Setup native deps
        uses: ./.github/actions/setup-windows-deps
        with:
          multiprocessing: ${{ matrix.mp_flag }}
          tests: 'false'
          cache: 'false'
          release: 'false'

      - name: Setup JDK 25
        uses: ./.github/actions/setup-java-jdk

      - name: Echo versions
        shell: msys2 {0}
        run: |
          echo "g++: $(g++ --version | head -1 | awk '{print $NF}')"
          echo "cmake: $(cmake --version | head -1 | awk '{print $3}')"
          echo "java: $(java -version 2>&1 | head -1)"

      # build_jar_windows.sh handles JAVA_HOME / Maven discovery via the Windows
      # registry, so this works from MSYS2's minimal PATH without further setup.
      - name: Build native JNI library + variant JAR
        shell: msys2 {0}
        run: bash scripts/build_jar_windows.sh ${{ matrix.variant }}

      # Run tests inside MSYS2 too. The JNI .dll is linked against mingw-w64's
      # libstdc++/libgcc/libwinpthread, which only sit on PATH inside MSYS2 —
      # launching `mvn test` from cmd would load the .dll and fail to resolve
      # those imports.  scripts/_msys2_find_mvn.sh is the same helper
      # build_jar_windows.sh sources, so dev + CI find Maven the same way.
      - name: Run Java tests
        shell: msys2 {0}
        working-directory: bindings/java
        run: |
          source "$GITHUB_WORKSPACE/scripts/_msys2_find_mvn.sh"
          setup_mvn_msys2_path
          mvn -B test -Dgempba.variant=${{ matrix.mvn_variant }}

      - name: Upload variant JAR
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: jar-windows-${{ matrix.classifier }}
          path: bindings/java/target/gempba-*-${{ matrix.classifier }}.jar
          if-no-files-found: error

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results-windows-${{ matrix.variant }}
          path: bindings/java/target/surefire-reports/TEST-*.xml
          if-no-files-found: warn

  build-macos:
    runs-on: ${{ fromJSON(vars.RUNNER_MACOS || '["macos-26"]') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: MT
            mp_flag: 'OFF'
            mvn_variant: multithreading
            classifier: mt
          - variant: MP
            mp_flag: 'ON'
            mvn_variant: multiprocessing
            classifier: mp-mpi

    steps:
      # Stale .git locks left by a prior cancelled run break actions/checkout
      # on long-lived self-hosted macOS runners — same dance the C/C++ macOS
      # workflow does.
      - name: Clean stale .git locks from prior interrupted runs
        shell: bash
        run: |
          if [ -d "$GITHUB_WORKSPACE/.git" ]; then
            find "$GITHUB_WORKSPACE/.git" -name '*.lock' -delete 2>/dev/null || true
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # Bootstraps Homebrew on PATH and brew-installs boost / hwloc / libomp /
      # (open-mpi when MP). Same composite the C/C++ macOS workflow uses, so
      # the JNI .dylib links against the exact deps gempba itself was tested with.
      - name: Setup native deps
        uses: ./.github/actions/setup-macos-deps
        with:
          multiprocessing: ${{ matrix.mp_flag }}
          tests: 'false'

      - name: Setup JDK 25
        uses: ./.github/actions/setup-java-jdk

      - name: Echo versions
        run: |
          echo "clang++: $(clang++ --version | head -1)"
          echo "cmake: $(cmake --version | head -1 | awk '{print $3}')"
          echo "java: $(java -version 2>&1 | head -1)"
          echo "mvn: $(mvn -v | head -1)"

      - name: Build native JNI library + variant JAR
        run: bash scripts/build_jar_macos.sh ${{ matrix.variant }}

      - name: Run Java tests
        working-directory: bindings/java
        run: mvn -B test -Dgempba.variant=${{ matrix.mvn_variant }}

      - name: Upload variant JAR
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: jar-macos-${{ matrix.classifier }}
          path: bindings/java/target/gempba-*-${{ matrix.classifier }}.jar
          if-no-files-found: error

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results-macos-${{ matrix.variant }}
          path: bindings/java/target/surefire-reports/TEST-*.xml
          if-no-files-found: warn

  # Merge each OS leg's per-OS variant JAR into one fat JAR per variant
  # containing every platform's native binary.  NativeLoader picks the right
  # natives/<os>-<arch>/ at runtime, so one merged JAR per variant is the
  # canonical artifact downstream Maven publish / GitHub Release jobs consume.
  assemble-multiplatform-jar:
    needs: [ build-ubuntu, build-windows, build-macos ]
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-24.04"]') }}
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # `jar` ships with the JDK; the composite pins the same Temurin version
      # the build legs already used.
      - name: Setup JDK 25
        uses: ./.github/actions/setup-java-jdk

      - name: Download all per-OS variant JARs
        uses: actions/download-artifact@v8
        with:
          pattern: jar-*
          path: per-os/

      - name: Merge natives subtrees per variant
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '<version>' bindings/java/pom.xml | sed -E 's/[[:space:]]*<version>([^<]+)<\/version>.*/\1/')
          mkdir -p merged
          for CLASSIFIER in mt mp-mpi; do
            JAR="gempba-${VERSION}-${CLASSIFIER}.jar"
            cp "per-os/jar-ubuntu-${CLASSIFIER}/${JAR}" "merged/${JAR}"
            for OS in windows macos; do
              TMP=$(mktemp -d)
              (cd "$TMP" && jar xf "$GITHUB_WORKSPACE/per-os/jar-${OS}-${CLASSIFIER}/${JAR}" natives)
              (cd "$TMP" && jar uf "$GITHUB_WORKSPACE/merged/${JAR}" natives)
              rm -rf "$TMP"
            done
            echo "--- merged ${JAR} natives/ ---"
            jar tf "merged/${JAR}" | grep '^natives/' | sort
          done

      - name: Upload merged multi-platform JARs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: gempba-multiplatform-jars
          path: merged/gempba-*-*.jar
          if-no-files-found: error
